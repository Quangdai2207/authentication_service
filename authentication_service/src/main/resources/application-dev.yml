server:
  port: 8080

spring:
  application:
    admin: authentication_service

  # Cau hinh Database
  datasource:
    url: jdbc:mysql://localhost:3306/authentication_service?useSSL=false&serverTimezone=UTC&zeroDateTimeBehavior=convertToNull
    username: root
    password:

  # Cau hinh JPA
  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        enable_lazy_load_no_trans: true
        default_batch_fetch_size: 10
        format_sql: true

  # Cau hinh OAuth2 Client
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email

  # Cau hinh dich vu Email
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${USERNAME_EMAIL_SENDER}
    password: ${PASSWORD_EMAIL_SENDER}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Cau hinh Redis -  Dung Redis cloud
  data:
    redis:
      url: ${REDIS_URL}



# Cau hinh chi can nhap "http://localhost:8080/swagger" thay vi go day du URL http://localhost:8080/swagger-ui/index.html
springdoc:
  swagger-ui:
    path: /swagger
    disable-swagger-default-url: true